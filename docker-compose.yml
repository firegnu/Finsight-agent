services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: finsight-agent:latest
    container_name: finsight-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite + Chroma across container rebuilds. Host path is
      # relative to this compose file, container path matches the defaults
      # in backend/config.py (DB_PATH=./data/finsight.db, CHROMA_DB_PATH=./data/chroma).
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
